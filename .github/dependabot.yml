# Group + throttle Dependabot so it surfaces what matters without flooding the inbox.
# - Patch + minor versions roll up into a single weekly PR per ecosystem.
# - Majors stay separate so they're reviewed deliberately.
version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend/web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      frontend-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      backend-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
