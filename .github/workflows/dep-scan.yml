name: Dependency Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit (frontend/web)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/web/package-lock.json
      - name: Install
        working-directory: frontend/web
        run: npm ci --ignore-scripts
      - name: Audit (fail on high+)
        working-directory: frontend/web
        run: npm audit --audit-level=high

  pip-audit:
    name: pip-audit (backend)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install pip-audit
        run: pip install pip-audit
      # Accepted-risk CVE list (review quarterly):
      #   PYSEC-2025-183  pyjwt    disputed; key length is caller's responsibility
      #   PYSEC-2025-{189-197,210}  torch  local memory corruption — attacker must
      #                                    already have code execution in Modal
      #   PYSEC-2026-139  torch    pt2 deserialization, local only, no fix yet
      #   PYSEC-2026-89   markdown HTML parser DoS; we don't parse untrusted
      #                            markdown on the backend (frontend uses
      #                            rehype-sanitize on GPT scouting reports)
      - name: Audit requirements.txt
        run: |
          pip-audit -r requirements.txt --strict \
            --ignore-vuln PYSEC-2025-183 \
            --ignore-vuln PYSEC-2025-189 \
            --ignore-vuln PYSEC-2025-190 \
            --ignore-vuln PYSEC-2025-191 \
            --ignore-vuln PYSEC-2025-192 \
            --ignore-vuln PYSEC-2025-193 \
            --ignore-vuln PYSEC-2025-194 \
            --ignore-vuln PYSEC-2025-195 \
            --ignore-vuln PYSEC-2025-196 \
            --ignore-vuln PYSEC-2025-197 \
            --ignore-vuln PYSEC-2025-210 \
            --ignore-vuln PYSEC-2026-139 \
            --ignore-vuln PYSEC-2026-89
      - name: Audit requirements-annotation.txt
        run: pip-audit -r requirements-annotation.txt --strict --ignore-vuln PYSEC-2026-89
